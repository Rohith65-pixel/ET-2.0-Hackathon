### Industrial Knowledge Intelligence - GraphRAG Configuration

############################
### LLM SETTINGS
############################

completion_models:
  default_completion_model:
    model_provider: openai
    model: llama3.1:8b
    api_base: http://localhost:11434/v1
    auth_method: api_key
    api_key: "ollama"
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: nomic-embed-text
    api_base: http://localhost:11434/v1
    auth_method: api_key
    api_key: "ollama"
    retry:
      type: exponential_backoff

############################
### DOCUMENT PROCESSING
############################

input:
  type: text
  file_pattern: ".*\\.md$"

chunking:
  type: tokens
  size: 1500
  overlap: 200
  encoding_model: o200k_base

############################
### STORAGE
############################

input_storage:
  type: file
  base_dir: "input"

output_storage:
  type: file
  base_dir: "output"

reporting:
  type: file
  base_dir: "logs"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

vector_store:
  type: lancedb
  db_uri: output/lancedb

############################
### WORKFLOW
############################

embed_text:
  embedding_model_id: default_embedding_model

#####################################################
### GRAPH EXTRACTION
#####################################################

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"

  entity_types:
    - equipment
    - equipment_tag
    - sensor
    - instrument
    - pipeline
    - valve
    - pump
    - compressor
    - boiler
    - motor
    - heat_exchanger
    - tank
    - maintenance
    - work_order
    - inspection
    - audit
    - failure
    - incident
    - root_cause
    - corrective_action
    - preventive_action
    - sop
    - oem_manual
    - regulation
    - department
    - operator
    - engineer
    - technician
    - quality_issue
    - location

  max_gleanings: 3

#####################################################
### DESCRIPTION SUMMARIZATION
#####################################################

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 1000

#####################################################
### NLP
#####################################################

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

#####################################################
### GRAPH CLUSTERING
#####################################################

cluster_graph:
  max_cluster_size: 25

#####################################################
### CLAIM EXTRACTION
#####################################################

extract_claims:
  enabled: true
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"

  description: >
    Equipment failures,
    maintenance activities,
    preventive maintenance,
    corrective maintenance,
    inspection findings,
    safety incidents,
    compliance violations,
    audit observations,
    quality deviations,
    operational events,
    root causes,
    corrective actions,
    preventive actions,
    maintenance recommendations.

  max_gleanings: 3

#####################################################
### COMMUNITY REPORTS
#####################################################

community_reports:
  completion_model_id: default_completion_model

  graph_prompt: "prompts/community_report_graph.txt"

  text_prompt: "prompts/community_report_text.txt"

  max_length: 4000

  max_input_length: 12000

#####################################################
### SNAPSHOTS
#####################################################

snapshots:
  graphml: true
  embeddings: true

#####################################################
### QUERY SETTINGS
#####################################################

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"